<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — FracTracker Wells</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f6f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .logo img { height: 48px; }
    .logo h1 {
      font-size: 1.25rem;
      color: #1a2e44;
      margin-top: 0.5rem;
    }
    .error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 4px;
      color: #b91c1c;
      font-size: 0.875rem;
      padding: 0.6rem 0.75rem;
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.3rem;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 5px;
      font-size: 0.95rem;
      margin-bottom: 1rem;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      outline: none;
      border-color: #3b82f6;
    }
    button[type="submit"] {
      width: 100%;
      padding: 0.65rem;
      background: #1a56db;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button[type="submit"]:hover { background: #1648c0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>FracTracker Wells</h1>
    </div>

    {% if form.errors %}
      <div class="error">Invalid username or password.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">
      <label for="id_username">Username</label>
      <input type="text" id="id_username" name="username" autofocus autocomplete="username">
      <label for="id_password">Password</label>
      <input type="password" id="id_password" name="password" autocomplete="current-password">
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
